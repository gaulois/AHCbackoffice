<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Accueil de l'application</title>
    <!-- Lien vers Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #ffffff;
            border-right: 1px solid #e5e7eb;
            box-shadow: 2px 0 8px rgba(17, 24, 39, 0.05);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 8px 20px 8px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 10px;
        }

        .sidebar-brand img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 8px;
        }

        .sidebar-brand-text {
            font-size: 0.95rem;
            font-weight: 700;
            color: #111827;
            line-height: 1.2;
        }

        .sidebar-brand-sub {
            font-size: 0.75rem;
            color: #6b7280;
            font-weight: 400;
        }

        .sidebar .nav-link {
            color: #374151;
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.9rem;
            transition: background 0.15s, color 0.15s;
            margin-bottom: 2px;
        }

        .sidebar .nav-link:hover {
            background: #fef2f2;
            color: #c30928;
        }

        .sidebar .nav-link.active-link {
            background: #fef2f2;
            color: #c30928;
            font-weight: 600;
        }

        .sidebar .nav-link.logout-link {
            color: #6b7280;
            margin-top: 12px;
            border-top: 1px solid #f0f0f0;
            padding-top: 14px;
        }

        .sidebar .nav-link.logout-link:hover {
            color: #c30928;
            background: #fef2f2;
        }

        .welcome-card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 6px 22px rgba(17, 24, 39, 0.06);
            border: none;
            padding: 48px 32px;
            text-align: center;
        }

        .welcome-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 10px;
        }

        .welcome-card p {
            color: #6b7280;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar (Navigation Bar) -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky pt-3 px-2">
                    <div class="sidebar-brand">
                        <img src="https://all-hygiene-company.be/wp-content/uploads/2022/06/logo-ahc.png" alt="AHC">
                        <div>
                            <div class="sidebar-brand-text">AHC</div>
                            <div class="sidebar-brand-sub">BackOffice</div>
                        </div>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a href="#" class="nav-link" onclick="loadContent('{{ url_for('create_user_route') }}')">👤 Créer un utilisateur</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link" onclick="loadContent('{{ url_for('user_list') }}')">📋 Liste des utilisateurs</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link" onclick="loadContent('{{ url_for('clients.create_client_route') }}')">➕ Créer un client</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link" onclick="loadContent('{{ url_for('clients.client_list') }}')">🏢 Liste des clients</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link" onclick="loadContent('{{ url_for('ingest.quick_ingest') }}')">📥 Envoi à la volée (Interventions)</a>
                        </li>
                        <li class="nav-item">
                            <a href="#" class="nav-link" onclick="clearContent()">🏠 Accueil</a>
                        </li>
                        <li class="nav-item">
                            <a href="/logout" class="nav-link logout-link">⎋ Déconnexion</a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Contenu principal qui sera remplacé dynamiquement -->
            <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
                <div id="content-container">
                    <!-- Contenu par défaut de bienvenue -->
                    <div class="welcome-card mt-3">
                        <h1>{{message}} dans l'application</h1>
                        <p>Utilisez le menu à gauche pour naviguer dans l'application.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Lien pour Bootstrap 5 JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script -->
    <script>
        // Fonction générique pour confirmer et supprimer
        function confirmDelete(url) {
        if (confirm("Êtes-vous sûr de vouloir supprimer ce client ? Cette action est irréversible.")) {
            fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                }
            })
            .then(response => {
                if (response.ok) {
                    alert("Client supprimé avec succès.");
                    loadContent('/client_list'); // Recharge la liste des clients
                } else {
                    alert("Erreur lors de la suppression du client.");
                }
            })
            .catch(error => console.error("Erreur :", error));
        }
    }

        function executeScripts(container) {
            container.querySelectorAll('script').forEach(function(old) {
                const s = document.createElement('script');
                s.textContent = old.textContent;
                old.replaceWith(s);
            });
        }

        function loadContent(url) {
    document.getElementById('content-container').innerHTML = ''; // Efface le contenu actuel
    fetch(url)
        .then(response => response.text())
        .then(data => {
            const container = document.getElementById('content-container');
            container.innerHTML = data;
            executeScripts(container);

            // 🔥 Déclencher un événement quand une page est chargée dynamiquement
            const event = new CustomEvent("welcomeContentLoaded", { detail: url });
            document.dispatchEvent(event);
        })
        .catch(error => console.error('Erreur de chargement:', error));
}

        // Fonction pour effacer le contenu et afficher l'accueil
        function clearContent() {
            document.getElementById('content-container').innerHTML = `
                <div class="welcome-card mt-3">
                    <h1>Bienvenue dans l'application</h1>
                    <p>Utilisez le menu à gauche pour naviguer dans l'application.</p>
                </div>
            `;
        }

 // Chargement automatique en fonction des paramètres d'URL
const params = new URLSearchParams(window.location.search);
const contentToLoad = params.get('load');
const page = params.get('page') || 1; // Par défaut, la page est 1
const searchQuery = params.get('search') || ''; // Requête de recherche par défaut vide
const filterOption = params.get('filter') || ''; // Filtrage par défaut vide

if (contentToLoad === "user_list") {
    loadContent('{{ url_for('user_list') }}');
} else if (contentToLoad === "create_user") {
    loadContent('{{ url_for('create_user_route') }}');
} else if (contentToLoad === "client_list") {
    loadContent(`{{ url_for('clients.client_list') }}?page=${page}&search=${searchQuery}&filter=${filterOption}`);
} else if (contentToLoad === "create_client") {
    loadContent('{{ url_for('clients.create_client_route') }}');
} else if (contentToLoad.startsWith("edit_client_route=")) {
    const clientId = contentToLoad.split("=")[1];
    loadContent(`{{ url_for('clients.edit_client_route', client_id='') }}${clientId}`);
}
    </script>

</body>
</html>
