<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Envoi à la volée — Interventions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            color: #333;
        }

        h1 {
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        .dropzone {
            border: 3px dashed #cfcfcf;
            border-radius: 10px;
            padding: 50px 20px;
            text-align: center;
            background: #fafafa;
            transition: 0.2s;
        }

        .dropzone.dragover {
            border-color: #0d6efd;
            background: #eef5ff;
        }

        .select-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 14px 24px;
            background: #0d6efd;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            border: none;
        }

        .send-btn {
            margin-top: 25px;
            padding: 14px 24px;
            background: #79a88a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .send-btn:disabled {
            background: #bfc9c2;
            cursor: not-allowed;
        }

        .file-list {
            margin-top: 20px;
            padding: 0;
            list-style: none;
        }

        .file-list li {
            padding: 8px 12px;
            margin-bottom: 6px;
            background: #f3f3f3;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th, td {
            border-bottom: 1px solid #ddd;
            text-align: left;
            padding: 12px 8px;
        }

        .badge-ok {
            color: white;
            background: #28a745;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .badge-warn {
            color: #333;
            background: #ffc107;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .badge-err {
            color: white;
            background: #dc3545;
            padding: 4px 8px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1>Envoi à la volée — Interventions</h1>
    <div class="subtitle">
        Dépose plusieurs PDF scannés contenant le QR client (ils seront classés automatiquement dans les documents du client).
    </div>

    <div id="dz" class="dropzone">
        <div style="font-size: 22px; margin-bottom: 10px;">Glissez-déposez vos PDF ici</div>
        <div style="font-size: 18px; color: #666;">ou</div>

        <label class="select-btn">
            Sélectionner des PDF
            <input id="fileInput" type="file" accept="application/pdf" multiple hidden>
        </label>
    </div>

    <ul id="fileList" class="file-list"></ul>

    <button id="sendBtn" class="send-btn" disabled>Envoyer</button>

    <h2 style="margin-top: 40px;">Résultats</h2>
    <table>
        <thead>
            <tr>
                <th>Fichier</th>
                <th>Statut</th>
                <th>Client</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="results"></tbody>
    </table>

    <script>
        const dz = document.getElementById('dz');
        const fileInput = document.getElementById('fileInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileList = document.getElementById('fileList');
        const results = document.getElementById('results');

        let selectedFiles = [];

        function refreshFileList() {
            fileList.innerHTML = '';

            if (selectedFiles.length === 0) {
                sendBtn.disabled = true;
                return;
            }

            selectedFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.textContent = `${index + 1}. ${file.name}`;
                fileList.appendChild(li);
            });

            sendBtn.disabled = false;
        }

        function addFiles(fileListObj) {
            const incoming = Array.from(fileListObj);

            incoming.forEach(file => {
                const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
                if (!isPdf) {
                    return;
                }

                const alreadyExists = selectedFiles.some(f =>
                    f.name === file.name &&
                    f.size === file.size &&
                    f.lastModified === file.lastModified
                );

                if (!alreadyExists) {
                    selectedFiles.push(file);
                }
            });

            refreshFileList();
        }

        dz.addEventListener('dragover', function (e) {
            e.preventDefault();
            dz.classList.add('dragover');
        });

        dz.addEventListener('dragleave', function () {
            dz.classList.remove('dragover');
        });

        dz.addEventListener('drop', function (e) {
            e.preventDefault();
            dz.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', function (e) {
            addFiles(e.target.files);
            fileInput.value = '';
        });

        sendBtn.addEventListener('click', async function () {
            if (selectedFiles.length === 0) {
                alert("Aucun fichier sélectionné.");
                return;
            }

            const formData = new FormData();
            selectedFiles.forEach(file => formData.append('files', file));

            sendBtn.disabled = true;
            sendBtn.textContent = 'Envoi en cours...';

            try {
                const response = await fetch('/api/ingest_docs', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                results.innerHTML = '';

                (data.results || []).forEach(item => {
                    const tr = document.createElement('tr');

                    let badge = '';
                    if (item.status === 'ok') {
                        badge = '<span class="badge-ok">Classé</span>';
                    } else if (item.status === 'unassigned') {
                        badge = '<span class="badge-warn">À classer</span>';
                    } else {
                        badge = '<span class="badge-err">Erreur</span>';
                    }

                    tr.innerHTML = `
                        <td>${item.file || ''}</td>
                        <td>${badge}</td>
                        <td>${item.clientId || ''}</td>
                        <td>${item.message || ''}</td>
                    `;
                    results.appendChild(tr);
                });

                selectedFiles = [];
                refreshFileList();
            } catch (err) {
                alert("Erreur lors de l'envoi des fichiers.");
                console.error(err);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Envoyer';
            }
        });
    </script>

</body>
</html>
